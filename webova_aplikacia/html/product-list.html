<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produkty</title>

    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../js/components/search.css">
    <link rel="stylesheet" href="../js/main_logic/downloadToPDFButton.css">
    <link rel="stylesheet" href="../js/components/dynamicNavbar.css">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
    <!-- Font Awesome JS-->
    <script src="https://kit.fontawesome.com/2f3faae799.js" crossorigin="anonymous"></script>

    <script defer type="module" src="../js/product_list/product_list.js"></script>
</head>

<body>

    <div class="site-header">
        <div class="container" id="upper-container" style="justify-content: center; flex-direction: row; margin-top: 0">
            <button id="download-pdf-button" class="action-button">
                <i id="pdf-icon" class="fas fa-file-pdf"></i>
            </button>

            <form id="search-bar" style="width: 100%">
                <label for="productSearchInput"></label>
                <input id="productSearchInput" class="form-control" type="text" placeholder="vegan, coca-cola, farmárske kura, slané pečivo, sladkosti, billa...  " autocomplete="off">
                <button type="submit">Vyhľadaj</button>
            </form>

            <button id="login-button" class="action-button">
                <i id="login-icon" class="fa-solid fa-user"></i>
            </button>
        </div>

        <header>

            <!-- Bootstrap 5 Navbar -->
            <nav id="navbar" class="navbar navbar-expand-xxl bg-body-tertiary mb-3 mt-3" style="background-color: yellowgreen !important;">
            </nav>

        </header>
    </div>

    <main>

        <div id="price-filter-container" class="container"></div>
        <div class="container" id="search-filter-container" style="margin-top: 1rem; margin-bottom: 2rem"></div>

        <!-- Tu sa vygeneruju karty produktov -->
        <div class="container" id="card-container"></div>
    </main>

    <footer class="site-footer mt-4">
        <div class="container d-flex flex-column flex-sm-row justify-content-between align-items-center gap-2 py-3">
            <small class="text-muted mb-0">©2026 Bakalárka</small>
            <div class="d-flex align-items-center gap-3">
                <a class="footer-link" href="../index.html">Home</a>
                <a class="footer-link" href="mailto:ozik27@example.com">Contact</a>
            </div>
        </div>
    </footer>
</body>
</html>
